version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend/api-server
    env_file:
      - ./backend/api-server/.env
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis

  ai:
    build: ./apps/ai-service
    env_file:
      - ./apps/ai-service/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongo

  nginx:
    image: nginx:stable
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - ai

volumes:
  mongo-data:
