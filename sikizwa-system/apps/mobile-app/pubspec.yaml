name: sikizwa_mobile
description: AI-powered anonymous voice reporting and emotional wellness platform.
publish_to: 'none'
environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  dio: ^6.2.1
  go_router: ^7.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.15.0
  firebase_messaging: ^14.4.0
  flutter_secure_storage: ^9.0.2
  intl: ^0.18.0
  uuid: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.4.3
  hive_generator: ^2.2.0

flutter:
  uses-material-design: true
