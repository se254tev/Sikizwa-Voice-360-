version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "6379:6379"

  backend:
    build: ./backend/api-server
    env_file:
      - ./backend/api-server/.env
    environment:
      - AI_SERVICE_URL=http://ai:8000
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  ai:
    build: ./apps/ai-service
    env_file:
      - ./apps/ai-service/.env
    environment:
      - WORKERS=2
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongo
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  nginx:
    image: nginx:stable
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - ai

volumes:
  mongo-data:
